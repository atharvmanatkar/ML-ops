name: MLOps Pipeline

on:
  push:
    branches: ["main"]

jobs:
  # 🔹 JOB 1: Setup
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  # 🔹 JOB 2: Train Pipeline
  train:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run training pipeline (generate model)
        run: |
          python main.py

  # 🔹 JOB 3: Test Model
  test:
    runs-on: ubuntu-latest
    needs: train
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ✅ IMPORTANT: recreate model in CI
      - name: Re-run pipeline to ensure model exists
        run: |
          python main.py

      - name: Test prediction
        run: |
          python -c "from src.predict import predict; print(predict([0]*10))"

  # 🔹 JOB 4: Deploy (CD)
  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: success()
    steps:
      - name: Deploy step
        run: echo "Deployment successful 🚀"
